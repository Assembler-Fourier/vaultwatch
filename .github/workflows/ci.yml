name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  engine-rust:
    name: engine-rust (cargo)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine-rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine-rust
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --release

  gateway-go:
    name: gateway-go (go test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: gateway-go/go.sum
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./... -race

  agents-python:
    name: agents-python (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agents-python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: agents-python/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: ruff check app tests seed.py
      - run: pytest -q

  dashboard-web:
    name: dashboard-web (typecheck, lint, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard-web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          # CI never calls a real model - showcase mode's replay path is
          # what's actually exercised by the build/typecheck.
          MODE: replay
